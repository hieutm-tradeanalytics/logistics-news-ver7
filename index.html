*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}

.s-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;cursor:pointer;font-size:15px;padding:0}

.spin{display:inline-block}
.spin.go{animation:rot .7s linear infinite}

/* ─ TICKER ─ */

.ticker-lbl{background:#333;padding:0 16px;height:100%;display:flex;align-items:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;flex-shrink:0;border-right:2px solid #b80000}

function gAllImgs(html) {
  if (!html) return [];
  const re = /<img[^>]+(?:src|data-src|data-lazy-src)=["']([^"']+)["']/gi;

}

function pick(arr) {
  if (!arr || !arr.length) return '';

/* ═══════════════════════════════════════════════════════════
   PARSE XML — fallback khi rss2json thất bại
═══════════════════════════════════════════════════════════ */
function parseXML(txt, name) {
  if (!txt || txt.length < 100) return null;
  let doc;
  try {
    doc = new DOMParser().parseFromString(txt, 'application/xml');
    if (doc.querySelector('parsererror')) throw 0;
  } catch(_) {
    try { doc = new DOMParser().parseFromString(txt, 'text/html'); }
    catch(__) { return null; }
  }
  const srcTitle = doc.querySelector('channel>title,feed>title')?.textContent || '';
  const items    = doc.querySelectorAll('item,entry');
  if (!items.length) return null;
  return Array.from(items).slice(0,25).map(it => {
    const title = san(it.querySelector('title')?.textContent||'');
    const lnk   = it.querySelector('link');
    const link  = (lnk?.textContent||'').trim() || lnk?.getAttribute('href')||'';
    const dEl   = it.querySelector('description,summary,content');
    const raw   = dEl?.textContent||'';
    const desc  = san(raw).slice(0,220);
    const date  = it.querySelector('pubDate,published,updated')?.textContent||'';
    const encl  = it.querySelector('enclosure')?.getAttribute('url')||'';
    const media = it.querySelector('media\\:thumbnail,media\\:content')?.getAttribute('url')||'';
    const imgs  = gAllImgs(raw);
    const mainImg = fixImg(encl||media||pick(imgs)||'');
    return {
      title, link: link.startsWith('http')?link:'',
      desc, date: date.trim(),
      image: mainImg, images: imgs,
      source: name||san(srcTitle),
    };
  }).filter(a => a.title.length>5 && a.link.startsWith('http'));
}

function isArticleUrl(href) {
  let path = '';
  try { path = new URL(href).pathname; } catch(_) { return false; }

  const segs = path.split('/').filter(Boolean);
  if (segs.length < 1) return false;

  const last = segs[segs.length - 1];
  // Loại bỏ nếu last segment là category thuần
  if (CAT_SEGS.has(last.toLowerCase())) return false;
  // Loại bỏ nếu last segment quá ngắn (< 6 ký tự) trừ khi là số ID dài
  if (last.length < 6 && !/^\d{4,}$/.test(last)) return false;
  // Chấp nhận: có slug dài với dấu '-' hoặc có số trong path
  const hasArticleIndicator =
    last.includes('-') ||   // slug bình thường
    /\d{4,}/.test(path) ||  // chứa số ID hoặc năm
    last.includes('.html') ||
    last.includes('.htm') ||
    last.includes('.php');
  return hasArticleIndicator || last.length >= 20;
}

function extract(html, pageUrl, name) {
  if (!html || html.length < 300) return [];
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Xoá vùng nhiễu
  [
    'script','style','noscript','iframe',
    'nav','header','footer','aside',
    '.nav','.navigation','.menu','.header','.footer','.sidebar',
    '.widget','.breadcrumb','.pagination','.tags','.social',
    '.share','.comment','.ad','.advertisement','.cookie',
    '.popup','.banner','.subscribe','.newsletter','.related',
    '#nav','#header','#footer','#sidebar','#menu',
    '[role="navigation"]','[role="banner"]','[role="contentinfo"]',
  ].forEach(s => { try { doc.querySelectorAll(s).forEach(el=>el.remove()); } catch(_){} });

  let origin='';
  try { origin = new URL(pageUrl).origin; } catch(_) {}

  // Từ điều hướng ngắn thường gặp
  const NAV_RE = /^(home|about|contact|login|register|sign\s*up|subscribe|search|menu|tags?|category|categories|archive|privacy|terms|more|read\s*more|view\s*all|all\s*news|trang\s*chủ|liên\s*hệ|giới\s*thiệu|đăng\s*nhập|đăng\s*ký|tất\s*cả|xem\s*thêm|đọc\s*thêm|next|previous|back|tìm\s*hiểu\s*thêm|\d{1,3}|\d{4})$/i;

  const seen    = new Set();
  const results = [];

  doc.querySelectorAll('a[href]').forEach(a => {
    const raw = (a.textContent||'').replace(/\s+/g,' ').trim();
    if (raw.length < 15 || raw.length > 300) return;
    if (NAV_RE.test(raw)) return;

    let href = (a.getAttribute('href')||'').trim();
    if (!href || href==='#' || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
    if (href.startsWith('/'))  href = origin + href;
    if (href.startsWith('//')) href = 'https:' + href;
    if (!href.startsWith('http')) return;

    // Cùng domain
    try { if (origin && new URL(href).origin !== origin) return; } catch(_) { return; }

    // Lọc URL bài viết thật (bỏ category/tag/page)
    if (!isArticleUrl(href)) return;

    if (seen.has(href)) return;
    seen.add(href);

    // Container gần nhất
    const ctr = a.closest(
      'article,[class*=item],[class*=post],[class*=card],[class*=news],[class*=entry],[class*=story],li.item,li.post,.list-item'
    ) || a.parentElement?.parentElement || a.parentElement;

    // Lấy TẤT CẢ ảnh trong container, chọn ngẫu nhiên
    const allImgEls = ctr ? [...ctr.querySelectorAll('img[src],img[data-src],img[data-lazy-src]')] : [];
    const imgs = allImgEls.map(img =>
      fixImg(img.getAttribute('data-lazy-src') || img.getAttribute('data-src') || img.getAttribute('src') || '')
    ).filter(Boolean);
    const image = pick(imgs) || '';

    const tEl  = ctr?.querySelector('time,[class*=date],[class*=time],[class*=meta] span');
    const date = (tEl?.getAttribute('datetime') || tEl?.getAttribute('content') || san(tEl?.textContent||'')).slice(0,30);

    const dEl  = ctr?.querySelector('p,[class*=desc],[class*=excerpt],[class*=summary],[class*=intro]');
    const desc = san(dEl?.textContent||'').slice(0,200);

    const score = (image?3:0) + (date?2:0) + (desc?1:0) + Math.min(raw.length/60,2);
    results.push({ title:raw, link:href, source:name, image, images:imgs, date, desc, _score:score });
  });

  results.sort((a,b) => b._score - a._score);
  return results.slice(0,22);
}

async function fetchSrc(src) {
  const html = await getHTML(src.url);
  if (!html) return [];
  return extract(html, src.url, src.n);
}

/* ═══════════════════════════════════════════════════════════
   INTERLEAVE — đa dạng nguồn (round-robin)
═══════════════════════════════════════════════════════════ */
function interleave(articles) {
  const bySrc = {};
  articles.forEach(a => { (bySrc[a.source]=bySrc[a.source]||[]).push(a); });
  Object.values(bySrc).forEach(arr => arr.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)));
  const qs = Object.values(bySrc), out = [];
  while (qs.some(q=>q.length)) { qs.forEach(q=>{if(q.length) out.push(q.shift());}); }
  return out;
}

function dedup(arr) {
  const seen = new Set();
  return arr.filter(a => {
    const k = (a.title||'').slice(0,70);
    if (!k || seen.has(k)) return false;
    seen.add(k); return true;
  });
}

/* ═══════════════════════════════════════════════════════════
   LOAD ALL
═══════════════════════════════════════════════════════════ */
async function loadAll() {
  progress(10);
  
  const all = [...SRC.vn, ...SRC.int];
  const results = await Promise.allSettled(all.map(s=>fetchSrc(s)));
  progress(80);
  const vnItems=[], intItems=[];
  results.forEach((r,i) => {
    const items = (r.status==='fulfilled' ? r.value : [])||[];
    if (i < SRC.vn.length) vnItems.push(...items);
    else                   intItems.push(...items);
  });
  const newVN  = dedup(interleave(vnItems));
  const newINT = dedup(interleave(intItems));
  S.vn = newVN.length ? newVN : S.vn;
  S.int = newINT.length ? newINT : S.int;
  try {
    localStorage.setItem(CK, JSON.stringify(S));
    localStorage.setItem(CTS, String(Date.now()));
  } catch(_) {}
  progress(100);
  renderAll();
  buildTicker();
  $('updateLbl').textContent = 'Cập nhật: ' + new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
  const total = S.vn.length + S.int.length;
  toast(total>0 ? `✓ Đã tải ${total} bài (VN: ${S.vn.length} | QT: ${S.int.length})` : '⚠ Không tải được tin — kiểm tra kết nối');
  setTimeout(()=>progress(0), 600);
}

(function init() {
  $('tickLbl').textContent = new Date().toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  try {
    const raw = localStorage.getItem(CK);
    const ts  = parseInt(localStorage.getItem(CTS)||'0');
    if (raw && (Date.now()-ts) < MAX_CACHE_MS) {
      S = JSON.parse(raw);
      renderAll(); buildTicker();
      $('updateLbl').textContent = 'Cache: ' + new Date(ts).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
    }
  } catch(_) {}
  loadAll();
  setInterval(loadAll, 30*60*1000);
})();

function renderAll() {

  renderHero('heroVN_a',  vn[0], 'vn');
  renderGrid('gVN_a',     vn.slice(1,7),  'vn');
  renderHero('heroINT_a', ii[0], 'int');
  renderGrid('gINT_a',    ii.slice(1,7),  'int');
  renderHero('heroVN_t',  vn[0], 'vn');
  renderGrid('gVN_t',     vn.slice(1,25), 'vn');
  renderHero('heroINT_t', ii[0], 'int');
  renderGrid('gINT_t',    ii.slice(1,25), 'int');
}

function renderHero(id, art, type) {
  const el=$(id); if(!el) return;
  if(!art){el.innerHTML='';return;}
  const isVN = type==='vn';
  const ph   = isVN ? 'h-ph-vn' : 'h-ph-int';
  const cat  = isVN ? 'TIN VIỆT NAM' : 'TIN QUỐC TẾ';
  const imgUrl = bestImg(art);
  const imgHtml = imgUrl
    ? `<img src="${esc(imgUrl)}" alt="" loading="lazy" onerror="this.src='';this.onerror=null;this.parentNode.innerHTML='<div class=h-ph ${ph}></div>'">`
    : `<div class="h-ph ${ph}"></div>`;
  // INT: luôn hiện ngày tuyệt đối; VN: hiện tương đối
  const dateTxt = isVN ? fmtRel(art.date) : fmtAbs(art.date);
  el.innerHTML = `
  <a href="${esc(art.link)}" target="_blank" rel="noopener" class="hero-card">
    <div class="h-img">${imgHtml}</div>
    <div class="h-body">
      <div class="h-cat">${cat}</div>
      <div class="h-title">${esc(art.title)}</div>
      <div class="h-desc">${esc(art.desc)||'Nhấp để đọc toàn bộ…'}</div>
      <div class="h-meta">
        <span class="h-src">${esc(art.source)}</span>
        <span>${dateTxt}</span>
      </div>
    </div>
  </a>`;
}

function renderGrid(id, arts, type) {
  const el=$(id); if(!el) return;
  if(!arts?.length){
    el.innerHTML=`<div class="empty">
      <div class="empty-ico">${type==='vn'?'📰':'🌐'}</div>
      <div class="empty-msg">Chưa có dữ liệu</div>
      <div class="empty-sub">Nhấn "Làm mới" để tải tin tức</div>
    </div>`;
    return;
  }
  const isVN=type==='vn';
  const ph=isVN?'c-ph-vn':'c-ph-int';
  const ico=isVN?'📰':'📦';
  el.innerHTML=arts.map(a=>{
    const imgUrl = bestImg(a);
    const img = imgUrl
      ? `<img src="${esc(imgUrl)}" alt="" loading="lazy" onerror="this.src='';this.onerror=null;this.parentNode.innerHTML='<div class=c-ph ${ph}>${ico}</div>'">`
      : `<div class="c-ph ${ph}">${ico}</div>`;
    // INT: ngày tuyệt đối; VN: tương đối
    const dateTxt = isVN ? fmtRel(a.date) : fmtAbs(a.date);
    return `
    <a href="${esc(a.link)}" target="_blank" rel="noopener" class="card">
      <div class="c-thumb">${img}</div>
      <div class="c-body">
        <div class="c-src">${esc(a.source)}</div>
        <div class="c-title">${esc(a.title)}</div>
        <div class="c-foot">
          <span class="c-foot-src">${esc(a.source)}</span>
          <span>${dateTxt}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   TICKER
═══════════════════════════════════════════════════════════ */
function buildTicker() {
  const pool=[...S.vn.slice(0,8),...S.int.slice(0,8)];
  if(!pool.length) return;
  const html=[...pool,...pool].map(a=>
    `<span class="t-item"><a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title.slice(0,90))}</a></span><span class="t-sep"> ● </span>`
  ).join('');
  $('tickInner').innerHTML=html;
}

function goTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.n-tab').forEach(b=>b.classList.remove('active'));
  const nmap={all:'nAll',vn:'nVN',int:'nINT'};
  if(nmap[tab]) $(nmap[tab])?.classList.add('active');
  ['panelAll','panelVN','panelINT','panelSearch'].forEach(id=>{const el=$(id);if(el)el.style.display='none';});
  const pmap={all:'panelAll',vn:'panelVN',int:'panelINT'};
  $(pmap[tab]||'panelAll').style.display='';
  $('sInput').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════════════════════
   TÌM KIẾM
═══════════════════════════════════════════════════════════ */
function doSearch(q) {
  q=q.trim();
  if(!q){
    $('panelSearch').style.display='none';
    const pmap={all:'panelAll',vn:'panelVN',int:'panelINT'};
    $(pmap[currentTab]||'panelAll').style.display='';
    return;
  }
  const low=q.toLowerCase();
  const hits=[...S.vn,...S.int].filter(a=>a.title.toLowerCase().includes(low)||a.desc.toLowerCase().includes(low));
  $('sBanner').innerHTML=`Tìm kiếm "<strong>${esc(q)}</strong>" — tìm thấy <strong>${hits.length}</strong> kết quả`;
  renderGrid('gSearch',hits.slice(0,18),'all');
  ['panelAll','panelVN','panelINT'].forEach(id=>{const el=$(id);if(el)el.style.display='none';});
  $('panelSearch').style.display='';
}

/* ═══════════════════════════════════════════════════════════

function progress(pct) {
  const el=$('pbar');if(!el)return;
  el.style.width=pct+'%';
  el.style.opacity=pct===0?'0':'1';
}

/* ═══════════════════════════════════════════════════════════
   TIỆN ÍCH
═══════════════════════════════════════════════════════════ */
function $(id){return document.getElementById(id);}

function san(s){
  return String(s||'')
    .replace(/<[^>]+>/g,' ')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ').trim();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fixImg(s){
  s=(s||'').trim();
  if(!s||s==='undefined'||s.startsWith('data:')||s.length<10) return '';
  // Bỏ ảnh tracking pixel (1x1)
  if(/[?&](w|width|h|height)=1(&|$)/.test(s)) return '';
  return s;
}

// Ngày tương đối — dùng cho Tin Việt Nam
function fmtRel(d){
  if(!d) return '—';
  const dt=new Date(d);
  if(isNaN(dt)) return String(d).slice(0,16);
  const diff=Math.floor((Date.now()-dt)/60000);
  if(diff<1)    return 'Vừa xong';
  if(diff<60)   return diff+'p trước';
  if(diff<1440) return Math.floor(diff/60)+'h trước';
  if(diff<43200)return Math.floor(diff/1440)+'ng trước';
  return dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// Ngày tuyệt đối — dùng cho Tin Quốc tế (luôn dd/mm/yyyy)
function fmtAbs(d){
  if(!d) return '—';
  const dt=new Date(d);
  if(isNaN(dt)) return String(d).slice(0,16);
  return dt.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function toast(msg){
  const t=$('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}
